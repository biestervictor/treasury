name: Java CI with Maven
env:
  MY_SECRET: ${{ secrets.ACTION_GITHUB_TOKEN  }}

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

permissions:
  contents: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build with Maven
        run: mvn clean install -Dspring.profiles.active=ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: results.sarif

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.actor != 'dependabot[bot]'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTION_GITHUB_TOKEN }}

      - name: Build Docker image
        if: github.actor != 'dependabot[bot]'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Update version/build-time + Helm values and push to dev
        if: github.actor != 'dependabot[bot]' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          # Auf dev-Branch wechseln (oder erstellen) und Änderungen dorthin pushen
          git fetch origin dev || true
          if git show-ref --verify --quiet refs/remotes/origin/dev; then
            git checkout -B dev origin/dev
          else
            git checkout -B dev
          fi

          # Tools
          sudo snap install yq

          # Build-Nummer hochzählen (values.yaml)
          current=$(yq -r '.treasury.build.version' helmcharts/values.yaml)
          if [ -z "$current" ] || [ "$current" = "null" ]; then current=0; fi
          next=$((current + 1))

          # Build-Time setzen (ISO-8601 UTC)
          build_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Values (Helm) aktualisieren
          yq -i '.treasury.image.tag = strenv(GITHUB_SHA)' helmcharts/values.yaml
          yq -i ".treasury.build.version = ${next}" helmcharts/values.yaml
          yq -i ".treasury.build.time = \"${build_time}\"" helmcharts/values.yaml

          # Properties (lokal + kubitos) aktualisieren
          sed -i "s/^treasury.build.version=.*/treasury.build.version=${next}/" src/main/resources/application.properties
          sed -i "s/^treasury.build.time=.*/treasury.build.time=${build_time}/" src/main/resources/application.properties
          sed -i "s/^treasury.build.version=.*/treasury.build.version=${next}/" src/main/resources/application-kubitos.properties
          sed -i "s/^treasury.build.time=.*/treasury.build.time=${build_time}/" src/main/resources/application-kubitos.properties

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helmcharts/values.yaml src/main/resources/application.properties src/main/resources/application-kubitos.properties

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "ci(dev): bump build to ${next} (${GITHUB_SHA}) [skip ci]"
          git push origin dev

