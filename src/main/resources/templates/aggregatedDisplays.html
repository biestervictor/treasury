<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Aggregierte Displays')"></head>
<body class="bg-light">

<th:block th:replace="navbarDisplay.html :: nav"></th:block>
<div th:replace="addDisplay.html :: addForm"></div>

<div class="container-fluid mt-4 px-4">

    <!-- Totals row -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <div class="text-muted small mb-1">Gesamtausgaben</div>
                    <div class="fs-4 fw-bold text-dark"
                         th:text="${#numbers.formatDecimal(totalExpenses, 1, 'COMMA', 2, 'POINT')} + ' €'">
                        0,00 €
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <div class="text-muted small mb-1">Aktueller Gesamtwert</div>
                    <div class="fs-4 fw-bold"
                         th:classappend="${currentValue >= totalExpenses} ? 'text-success' : 'text-danger'"
                         th:text="${#numbers.formatDecimal(currentValue, 1, 'COMMA', 2, 'POINT')} + ' €'">
                        0,00 €
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Card grid -->
    <div class="d-flex justify-content-end mb-2">
        <button id="ubToggle" class="btn btn-sm btn-outline-secondary"
                onclick="toggleUB()">Universe Beyond anzeigen</button>
    </div>
    <div class="row g-2">
        <div th:each="entry : ${aggregatedData}"
             class="col-4 col-sm-3 col-md-2 col-lg-1 ub-card"
             th:attr="data-ub=${entry.universeBeyond}">
            <a th:href="@{/api/display/list(setCode=${entry.setCode},type=${entry.type})}"
               class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 text-center"
                     th:style="${entry.sanitizedMarketPrice >= entry.averagePrice * 1.5}
                                ? 'background-color:rgba(13,110,253,0.12)'
                                : (${entry.sanitizedMarketPrice > entry.averagePrice}
                                   ? 'background-color:rgba(25,135,84,0.12)'
                                   : 'background-color:rgba(220,53,69,0.10)')">
                    <div class="card-body p-1 d-flex flex-column align-items-center">
                        <!-- Image -->
                        <div style="width:100%;height:130px;display:flex;align-items:center;justify-content:center;">
                            <img th:if="${entry.boosterBoxImageUrl != null}"
                                 th:src="${entry.boosterBoxImageUrl}"
                                 alt="Booster Box"
                                 style="max-width:100%;max-height:130px;object-fit:contain;">
                            <img th:if="${entry.boosterBoxImageUrl == null}"
                                 th:src="${entry.iconUri}" alt="Set-Icon"
                                 style="width:48px;height:48px;object-fit:contain;">
                        </div>
                        <!-- Info -->
                        <div class="d-flex align-items-center gap-1 mt-1">
                            <img th:src="${entry.iconUri}" alt="Set-Icon"
                                 style="width:12px;height:12px;object-fit:contain;flex-shrink:0;">
                            <span class="fw-semibold text-dark text-truncate"
                                  style="font-size:0.7rem;"
                                  th:text="${entry.setCode}">XXX</span>
                        </div>
                        <div class="text-muted"
                             style="font-size:0.65rem;"
                             th:text="${entry.type}">Type</div>
                        <span class="badge text-bg-secondary my-1"
                              style="font-size:0.6rem;"
                              th:text="${entry.count} + ' Stk'">0 Stk</span>
                        <div class="fw-bold mt-auto"
                             style="font-size:0.75rem;"
                             th:classappend="${entry.sanitizedMarketPrice >= entry.averagePrice * 1.5}
                                             ? 'text-primary'
                                             : (${entry.sanitizedMarketPrice > entry.averagePrice}
                                                ? 'text-success'
                                                : 'text-danger')"
                             th:text="${#numbers.formatDecimal(entry.sanitizedMarketPrice, 1, 'COMMA', 2, 'POINT')} + ' €'">
                            0,00 €
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

</div>

<th:block th:replace="fragments/layout :: bootstrapJs"></th:block>
<script>
    let showUB = false;
    function applyUBFilter() {
        document.querySelectorAll('.ub-card').forEach(function(card) {
            if (card.dataset.ub === 'true' && !showUB) {
                card.style.display = 'none';
            } else {
                card.style.display = '';
            }
        });
        document.getElementById('ubToggle').textContent =
            showUB ? 'Universe Beyond ausblenden' : 'Universe Beyond anzeigen';
    }
    function toggleUB() {
        showUB = !showUB;
        applyUBFilter();
    }
    document.addEventListener('DOMContentLoaded', applyUBFilter);
</script>
</body>
</html>
