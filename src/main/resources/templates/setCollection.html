<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Magic Sets Übersicht')"></head>
<body class="bg-light">
<th:block th:replace="navbarDisplay.html :: nav"></th:block>

<div class="container-fluid mt-4 px-4">
    <h1 class="fw-bold mb-1">Magic Sets</h1>
    <div class="d-flex align-items-center gap-3 mb-3">
        <p class="text-muted mb-0">
            <span class="badge text-bg-success me-1">Vorhanden</span> = mindestens ein Display im Bestand &nbsp;
            <span class="badge text-bg-warning me-1">Fehlt</span> = noch kein Display vorhanden
        </p>
        <form method="post" th:action="@{/api/sets/updateBoosterImages}" class="mb-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                Booster-Bilder aktualisieren
            </button>
        </form>
    </div>

    <!-- Filter bar -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-2">
            <form method="get" th:action="@{/api/sets/filter}" id="filterForm"
                  class="d-flex gap-2 flex-wrap align-items-center">
                <span class="text-muted small fw-semibold text-uppercase"
                      style="letter-spacing:0.08em;">Ausblenden:</span>

                <div class="btn-group flex-wrap gap-1" role="group">
                    <input type="checkbox" class="btn-check filter-toggle" id="toggle-core"
                           value="core" autocomplete="off"
                           th:checked="${setType != null and #strings.contains(setType,'core')}">
                    <label class="btn btn-outline-secondary btn-sm" for="toggle-core">core</label>

                    <input type="checkbox" class="btn-check filter-toggle" id="toggle-funny"
                           value="funny" autocomplete="off"
                           th:checked="${setType != null and #strings.contains(setType,'funny')}">
                    <label class="btn btn-outline-secondary btn-sm" for="toggle-funny">funny</label>

                    <input type="checkbox" class="btn-check filter-toggle" id="toggle-draft"
                           value="draft_innovation" autocomplete="off"
                           th:checked="${setType != null and #strings.contains(setType,'draft_innovation')}">
                    <label class="btn btn-outline-secondary btn-sm" for="toggle-draft">draft_innovation</label>

                    <input type="checkbox" class="btn-check filter-toggle" id="toggle-masters"
                           value="masters" autocomplete="off"
                           th:checked="${setType != null and #strings.contains(setType,'masters')}">
                    <label class="btn btn-outline-secondary btn-sm" for="toggle-masters">masters</label>

                    <input type="checkbox" class="btn-check filter-toggle" id="toggle-commander"
                           value="commander" autocomplete="off"
                           th:checked="${setType != null and #strings.contains(setType,'commander')}">
                    <label class="btn btn-outline-secondary btn-sm" for="toggle-commander">commander</label>

                    <input type="checkbox" class="btn-check filter-toggle" id="toggle-expansion"
                           value="expansion" autocomplete="off"
                           th:checked="${setType != null and #strings.contains(setType,'expansion')}">
                    <label class="btn btn-outline-secondary btn-sm" for="toggle-expansion">expansion</label>

                    <input type="checkbox" class="btn-check filter-toggle" id="toggle-ub"
                           value="ub" autocomplete="off"
                           th:checked="${setType != null and #strings.contains(setType,'ub')}">
                    <label class="btn btn-outline-secondary btn-sm" for="toggle-ub">Universe Beyond</label>
                </div>

                <input type="hidden" id="setType" name="setType" th:value="${setType}">
                <button type="submit" class="btn btn-primary btn-sm">Filtern</button>
                <a th:href="@{/api/sets/list}" class="btn btn-outline-secondary btn-sm">Zurücksetzen</a>
            </form>
        </div>
    </div>

    <!-- Stats row -->
    <div class="row g-3 mb-4" th:if="${missingSets != null}">
        <div class="col-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-body py-2 px-3 text-center">
                    <div class="text-muted small">Gesamt</div>
                    <div class="fw-bold fs-5" th:text="${#lists.size(allSets)}">0</div>
                </div>
            </div>
        </div>
        <div class="col-auto">
            <div class="card border-0 shadow-sm border-start border-4 border-success">
                <div class="card-body py-2 px-3 text-center">
                    <div class="text-muted small">Vorhanden</div>
                    <div class="fw-bold fs-5 text-success"
                         th:text="${#lists.size(allSets) - #lists.size(missingSets)}">0</div>
                </div>
            </div>
        </div>
        <div class="col-auto">
            <div class="card border-0 shadow-sm border-start border-4 border-warning">
                <div class="card-body py-2 px-3 text-center">
                    <div class="text-muted small">Fehlt</div>
                    <div class="fw-bold fs-5 text-warning"
                         th:text="${#lists.size(missingSets)}">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Card grid -->
    <div class="row g-2">
        <div th:each="set : ${allSets}" class="col-6 col-sm-4 col-md-3 col-lg-2">
            <div class="set-card card border-0 shadow-sm h-100"
                 style="cursor:pointer;"
                 th:classappend="${missingSets != null and #lists.contains(missingSets, set)}
                                   ? 'border-top border-3 border-warning'
                                   : 'border-top border-3 border-success'"
                 th:attr="data-code=${set.code},
                          data-name=${set.name},
                          data-image-url=${set.boosterBoxImageUrl},
                          data-icon-url=${set.iconUri},
                          data-set-type=${set.setType},
                          data-release=${set.releaseDate != null ? #temporals.format(set.releaseDate, 'MMM yyyy') : ''},
                          data-missing=${missingSets != null and #lists.contains(missingSets, set)}">
                <div class="card-body p-2 d-flex flex-column">
                    <!-- Top: booster box image -->
                    <div class="text-center mb-2"
                         style="height:110px;display:flex;align-items:center;justify-content:center;">
                        <img th:if="${set.boosterBoxImageUrl != null}"
                             th:src="${set.boosterBoxImageUrl}"
                             alt="Booster Box"
                             style="max-width:100%;max-height:110px;object-fit:contain;">
                        <img th:if="${set.boosterBoxImageUrl == null}"
                             th:src="${set.iconUri}" th:alt="${set.code}"
                             style="width:48px;height:48px;object-fit:contain;">
                    </div>
                    <!-- Name with set icon -->
                    <div class="d-flex align-items-center gap-1 mb-1">
                        <img th:src="${set.iconUri}" th:alt="${set.code}"
                             style="width:14px;height:14px;object-fit:contain;flex-shrink:0;">
                        <div class="fw-semibold text-dark text-truncate"
                             style="font-size:0.75rem;line-height:1.2;"
                             th:text="${set.name}">Name</div>
                    </div>
                    <!-- Badges: setType + inventory types + wish prices -->
                    <div class="d-flex flex-wrap gap-1 align-items-center mb-1">
                        <span class="badge text-bg-secondary"
                              style="font-size:0.6rem;"
                              th:text="${set.setType}">Type</span>
                        <span th:each="dtype : ${setCodeToTypes?.get(set.code.toUpperCase())}"
                              class="badge text-bg-info"
                              style="font-size:0.6rem;"
                              th:text="${dtype}"></span>
                        <!-- One badge per wish price: "DRAFT:300€ / 290€" -->
                        <th:block th:each="entry : ${set.wishPrices}"
                                  th:with="itemKey=${set.code.toUpperCase() + '|' + entry.key},
                                           mktPrice=${latestPricesMap != null ? latestPricesMap.get(set.code.toUpperCase() + '|' + entry.key) : null}">
                            <span class="badge"
                                  style="font-size:0.6rem;white-space:nowrap;"
                                  th:classappend="${mktPrice != null and mktPrice <= entry.value}
                                                  ? 'text-bg-success'
                                                  : 'text-bg-primary'"
                                  th:text="${entry.key + ':' + #numbers.formatDecimal(entry.value, 1, 'COMMA', 0, 'POINT') + '€'
                                            + (mktPrice != null ? ' / ' + #numbers.formatDecimal(mktPrice, 1, 'COMMA', 0, 'POINT') + '€' : '')}">
                            </span>
                        </th:block>
                    </div>
                    <!-- Date + status -->
                    <div class="d-flex align-items-center justify-content-between mt-auto">
                        <div class="text-muted"
                             style="font-size:0.65rem;"
                             th:text="${#temporals.format(set.releaseDate, 'MMM yyyy')}">Date</div>
                        <div class="d-flex gap-1 align-items-center">
                            <span th:if="${missingSets != null and #lists.contains(missingSets, set)}"
                                  class="badge text-bg-warning"
                                  style="font-size:0.6rem;">Fehlt</span>
                            <span th:unless="${missingSets != null and #lists.contains(missingSets, set)}"
                                  class="badge text-bg-success"
                                  style="font-size:0.6rem;">Vorhanden</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Set Detail Modal -->
<div class="modal fade" id="setDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header py-2">
                <div class="d-flex align-items-center gap-2">
                    <img id="modalSetIcon" src="" alt="" style="width:20px;height:20px;object-fit:contain;">
                    <h5 class="modal-title mb-0" id="modalSetName">-</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <!-- Left: image + wish prices -->
                    <div class="col-12 col-md-4 text-center">
                        <img id="modalSetImage" src="" alt="Booster Box"
                             style="max-width:100%;max-height:160px;object-fit:contain;" class="mb-3">
                        <hr class="my-2">
                        <div class="small fw-semibold text-muted mb-2">Wunschpreise</div>
                        <!-- List of existing wish prices -->
                        <div id="wishPriceList" class="mb-2 text-start"></div>
                        <!-- Add-form -->
                        <div class="input-group input-group-sm mb-1">
                            <select id="wishTypeSelect" class="form-select form-select-sm" style="max-width:110px;">
                                <option value="DRAFT">DRAFT</option>
                                <option value="SET">SET</option>
                                <option value="COLLECTOR">COLLECTOR</option>
                                <option value="PLAY">PLAY</option>
                                <option value="BUNDLE">BUNDLE</option>
                                <option value="PRERELEASE">PRERELEASE</option>
                                <option value="COMMANDER">COMMANDER</option>
                            </select>
                            <input type="number" id="wishPriceInput" class="form-control"
                                   placeholder="z.B. 89.99" step="0.01" min="0.01">
                            <span class="input-group-text">€</span>
                            <button class="btn btn-outline-primary" type="button"
                                    id="addWishPrice">+</button>
                        </div>
                    </div>
                    <!-- Right: price history chart -->
                    <div class="col-12 col-md-8">
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <div class="small text-muted">Preisverlauf</div>
                            <select id="chartTypeSelect" class="form-select form-select-sm"
                                    style="max-width:130px;">
                                <option value="DRAFT">DRAFT</option>
                                <option value="SET">SET</option>
                                <option value="COLLECTOR">COLLECTOR</option>
                                <option value="PLAY">PLAY</option>
                                <option value="BUNDLE">BUNDLE</option>
                                <option value="PRERELEASE">PRERELEASE</option>
                                <option value="COMMANDER">COMMANDER</option>
                            </select>
                        </div>
                        <div id="chartNoData" class="text-muted small" style="display:none;">
                            Noch keine Preisdaten für diesen Typ vorhanden.
                        </div>
                        <canvas id="priceHistoryChart" style="max-height:220px;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="fragments/layout :: bootstrapJs"></th:block>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const wishPricesMap = /*[[${wishPricesMap}]]*/ {};
    /*]]>*/
</script>
<script>
    // Filter form sync
    document.getElementById('filterForm').addEventListener('submit', function () {
        const checked = Array.from(document.querySelectorAll('.filter-toggle:checked'))
            .map(cb => cb.value);
        document.getElementById('setType').value = checked.join(',');
    });

    // Set detail modal logic
    let priceChart = null;
    let currentSetCode = null;

    document.querySelectorAll('.set-card').forEach(card => {
        card.addEventListener('click', function () {
            const code = this.dataset.code;
            const name = this.dataset.name;
            const imageUrl = this.dataset.imageUrl;
            const iconUrl = this.dataset.iconUrl;

            currentSetCode = code;

            // Header
            document.getElementById('modalSetName').textContent = name;
            document.getElementById('modalSetIcon').src = iconUrl || '';

            // Image
            const imgEl = document.getElementById('modalSetImage');
            imgEl.src = (imageUrl && imageUrl !== 'null') ? imageUrl : (iconUrl || '');

            // Wish prices list
            const wishPrices = wishPricesMap[code] || {};
            renderWishPricesList(wishPrices);

            // Load chart for first available type or DRAFT
            const chartTypes = Object.keys(wishPrices);
            const defaultType = chartTypes.length > 0 ? chartTypes[0] : 'DRAFT';
            document.getElementById('chartTypeSelect').value = defaultType;
            loadChart(code, defaultType);

            new bootstrap.Modal(document.getElementById('setDetailModal')).show();
        });
    });

    // Chart type selector
    document.getElementById('chartTypeSelect').addEventListener('change', function () {
        if (currentSetCode) {
            loadChart(currentSetCode, this.value);
        }
    });

    function renderWishPricesList(wishPrices) {
        const list = document.getElementById('wishPriceList');
        list.innerHTML = '';
        const entries = Object.entries(wishPrices);
        if (entries.length === 0) {
            list.innerHTML = '<div class="text-muted small">Noch keine Wunschpreise gesetzt</div>';
            return;
        }
        entries.forEach(([type, price]) => {
            const item = document.createElement('div');
            item.className = 'd-flex align-items-center gap-1 mb-1';
            item.innerHTML =
                '<span class="badge text-bg-secondary" style="font-size:0.65rem;">' + type + '</span>'
                + '<span class="small flex-grow-1 text-end">' + price.toFixed(2) + ' €</span>'
                + '<button class="btn btn-outline-danger btn-sm py-0 px-1 ms-1" '
                + 'style="font-size:0.65rem;line-height:1.4;" '
                + 'onclick="deleteWishPrice(\'' + type + '\')">×</button>';
            list.appendChild(item);
        });
    }

    function deleteWishPrice(type) {
        fetch('/api/sets/' + currentSetCode + '/wishPrice?type=' + type, {method: 'DELETE'})
            .then(r => {
                if (r.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('setDetailModal')).hide();
                    location.reload();
                }
            });
    }

    // Add wish price
    document.getElementById('addWishPrice').addEventListener('click', function () {
        const type = document.getElementById('wishTypeSelect').value;
        const price = parseFloat(document.getElementById('wishPriceInput').value);
        if (isNaN(price) || price <= 0) return;
        fetch('/api/sets/' + currentSetCode + '/wishPrice?type=' + type + '&price=' + price,
            {method: 'POST'})
            .then(r => {
                if (r.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('setDetailModal')).hide();
                    location.reload();
                }
            });
    });

    function loadChart(code, type) {
        fetch('/api/sets/' + code + '/' + type + '/priceHistory')
            .then(r => r.json())
            .then(data => renderChart(data, type))
            .catch(() => renderChart([], type));
    }

    function renderChart(data, type) {
        const canvas = document.getElementById('priceHistoryChart');
        const noData = document.getElementById('chartNoData');

        if (priceChart) {
            priceChart.destroy();
            priceChart = null;
        }

        if (!data || data.length === 0) {
            canvas.style.display = 'none';
            noData.style.display = 'block';
            return;
        }

        canvas.style.display = 'block';
        noData.style.display = 'none';

        priceChart = new Chart(canvas, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{
                    label: type + ' (€)',
                    data: data.map(d => d.price),
                    borderColor: 'rgba(13,110,253,0.9)',
                    backgroundColor: 'rgba(13,110,253,0.08)',
                    tension: 0.3,
                    fill: true,
                    pointRadius: data.length > 30 ? 2 : 4
                }]
            },
            options: {
                responsive: true,
                plugins: {legend: {display: false}},
                scales: {
                    y: {ticks: {callback: v => v.toFixed(2) + ' €'}},
                    x: {ticks: {maxTicksLimit: 8}}
                }
            }
        });
    }
</script>
</body>
</html>
