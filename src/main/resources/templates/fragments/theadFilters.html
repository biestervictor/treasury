<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Sammlung an thead-Filterzeilen (2. thead-row) für verschiedene Seiten.
  Voraussetzung: In der Seite existiert bereits ein <form id="tableFilterForm"> ... </form>
-->

<!-- Display-Filterzeile -->
<th:block th:fragment="displayFilterRow(types, soldOnly, isSelling, highProfitOnly)">
    <tr class="filter-row">
        <!--
          Display: Filterzeile bewusst unabhängig vom Spaltenlayout.
          Das verhindert Layout-Sprünge, wenn Spalten dynamisch ein-/ausgeblendet werden (z.B. Verkaufspreis bei soldOnly=true).
        -->
        <th colspan="16">
            <div class="d-flex flex-wrap align-items-center gap-3">
                <div style="min-width: 10rem;">
                    <!--
                      Safari: <select multiple size="1"> verhält sich nicht wie ein Dropdown und ist oft nicht bedienbar.
                      Daher: Single-Select als Picker; Auswahl wird zur Hidden-Liste hinzugefügt.
                    -->
                    <select class="form-select form-select-sm"
                            id="setCodeFilterSelect"
                            form="tableFilterForm"
                            onchange="(function(sel){
                              const value = sel.value;
                              if(!value){ return; }
                              const hidden = document.getElementById('filterSetCode');
                              const current = (hidden && hidden.value)
                                ? hidden.value.split(',').map(v=>v.trim()).filter(v=>v)
                                : [];
                              if(!current.includes(value)) current.push(value);
                              if(hidden) hidden.value = current.join(',');
                              // Reset, damit man direkt weitere Werte hinzufügen kann
                              sel.value = '';
                              document.getElementById('tableFilterForm').submit();
                            })(this)">
                        <option value="">Set…</option>
                        <option th:each="set : ${magicSets}"
                                th:if="${#strings.length(set.code) <= 3}"
                                th:value="${set.code}"
                                th:text="${set.code}"></option>
                    </select>
                </div>

                <!-- setCode wird ausschließlich über dieses Hidden-Feld gesendet (damit nie doppelt) -->
                <input type="hidden"
                       id="filterSetCode"
                       name="setCode"
                       form="tableFilterForm"
                       th:value="${(param.setCode != null and !#lists.isEmpty(param.setCode)) ? #strings.arrayJoin(param.setCode, ',') : ''}" />

                <!-- Aktive Set-Filter als Boxen (jeweils einzeln entfernbar)
                     Wichtig: param.setCode kann (je nach Request) entweder mehrfach vorkommen ODER als CSV-String kommen.
                     Wir rendern daher IMMER aus dem Hidden-Feld (CSV) heraus, damit entfernen zuverlässig funktioniert.
                -->
                <div th:if="${!#strings.isEmpty((param.setCode != null and !#lists.isEmpty(param.setCode)) ? #strings.arrayJoin(param.setCode, ',') : '')}"
                     class="d-flex flex-wrap align-items-center gap-2">
                    <button th:each="sc : ${#strings.arraySplit(#strings.arrayJoin(param.setCode, ','), ',')}"
                            th:if="${!#strings.isEmpty(sc)}"
                            type="button"
                            class="btn btn-outline-secondary btn-sm"
                            th:title="'Set entfernen: ' + ${sc}"
                            th:attr="data-value=${sc}"
                            onclick="(function(btn){
                              const value = btn.getAttribute('data-value');
                              const hidden = document.getElementById('filterSetCode');
                              const current = (hidden && hidden.value)
                                ? hidden.value.split(',').map(v=>v.trim()).filter(v=>v)
                                : [];
                              const next = current.filter(v => v !== value);
                              if(hidden) hidden.value = next.join(',');
                              const select = document.getElementById('setCodeFilterSelect');
                               if(select){ select.value = ''; }
                              document.getElementById('tableFilterForm').submit();
                            })(this)">
                        <span th:text="${sc}">SET</span>
                        <span aria-hidden="true">&nbsp;×</span>
                    </button>
                </div>

                <div style="min-width: 12rem;">
                    <select class="form-select form-select-sm"
                            id="typeFilterSelect"
                            form="tableFilterForm"
                            onchange="(function(sel){
                              const value = sel.value;
                              if(!value){ return; }
                              const hidden = document.getElementById('filterType');
                              const current = (hidden && hidden.value)
                                ? hidden.value.split(',').map(v=>v.trim()).filter(v=>v)
                                : [];
                              if(!current.includes(value)) current.push(value);
                              if(hidden) hidden.value = current.join(',');
                              sel.value = '';
                              document.getElementById('tableFilterForm').submit();
                            })(this)">
                        <option value="">Typ…</option>
                        <option th:each="t : ${types}"
                                th:value="${t}"
                                th:text="${t}"></option>
                    </select>
                </div>

                <!-- type wird ausschließlich über dieses Hidden-Feld gesendet (damit nie doppelt) -->
                <input type="hidden"
                       id="filterType"
                       name="type"
                       form="tableFilterForm"
                       th:value="${(param.type != null and !#lists.isEmpty(param.type)) ? #strings.arrayJoin(param.type, ',') : ''}" />

                <!-- Aktive Typ-Filter als Boxen (jeweils einzeln entfernbar)
                     Analog zu setCode: aus dem (ggf. CSV) Request ableiten, damit das Entfernen zuverlässig funktioniert.
                -->
                <div th:if="${!#strings.isEmpty((param.type != null and !#lists.isEmpty(param.type)) ? #strings.arrayJoin(param.type, ',') : '')}"
                     class="d-flex flex-wrap align-items-center gap-2">
                    <button th:each="ty : ${#strings.arraySplit(#strings.arrayJoin(param.type, ','), ',')}"
                            th:if="${!#strings.isEmpty(ty)}"
                            type="button"
                            class="btn btn-outline-secondary btn-sm"
                            th:title="'Typ entfernen: ' + ${ty}"
                            th:attr="data-value=${ty}"
                            onclick="(function(btn){
                              const value = btn.getAttribute('data-value');
                              const hidden = document.getElementById('filterType');
                              const current = (hidden && hidden.value)
                                ? hidden.value.split(',').map(v=>v.trim()).filter(v=>v)
                                : [];
                              const next = current.filter(v => v !== value);
                              if(hidden) hidden.value = next.join(',');
                              const select = document.getElementById('typeFilterSelect');
                               if(select){ select.value = ''; }
                              document.getElementById('tableFilterForm').submit();
                            })(this)">
                        <span th:text="${ty}">TYPE</span>
                        <span aria-hidden="true">&nbsp;×</span>
                    </button>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="soldFilter"
                           form="tableFilterForm"
                           th:checked="${soldOnly}"
                           onchange="document.getElementById('soldOnly').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="soldFilter">Verkauft</label>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="sellingFilter"
                           form="tableFilterForm"
                           th:checked="${isSelling}"
                           onchange="document.getElementById('isSelling').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="sellingFilter">Verkaufen</label>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="highProfitFilter"
                           form="tableFilterForm"
                           th:checked="${highProfitOnly}"
                           onchange="document.getElementById('highProfitOnly').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="highProfitFilter">&gt; 1.5x</label>
                </div>
            </div>
        </th>
    </tr>
</th:block>

<!-- SecretLair-Filterzeile -->
<th:block th:fragment="secretLairFilterRow(soldOnly, isSelling, highProfitOnly)">
    <tr class="filter-row">
        <!--
          SecretLair: Filterzeile bewusst unabhängig vom Spaltenlayout.
          Wir rendern eine einzige Zelle über die komplette Tabellenbreite.
          Vorteil: keine Breitenverschiebungen/Overflow, egal wie viele Spalten (oder Meta-Spalten) sichtbar sind.
        -->
        <th colspan="14">
            <div class="d-flex flex-wrap align-items-center gap-3">
                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="soldFilter"
                           form="tableFilterForm"
                           th:checked="${soldOnly}"
                           onchange="document.getElementById('soldOnly').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="soldFilter">Verkauft</label>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="isSellingFilter"
                           form="tableFilterForm"
                           th:checked="${isSelling}"
                           onchange="document.getElementById('isSelling').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="isSellingFilter">Verkaufen</label>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="highProfitFilter"
                           form="tableFilterForm"
                           th:checked="${highProfitOnly}"
                           onchange="document.getElementById('highProfitOnly').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="highProfitFilter">&gt; 1.5x</label>
                </div>
            </div>
        </th>
    </tr>
</th:block>

</body>
</html>
