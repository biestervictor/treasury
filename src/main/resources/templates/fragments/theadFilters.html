<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Sammlung an thead-Filterzeilen (2. thead-row) für verschiedene Seiten.
  Voraussetzung: In der Seite existiert bereits ein <form id="tableFilterForm"> ... </form>
-->

<!-- Display-Filterzeile -->
<th:block th:fragment="displayFilterRow(types, soldOnly, isSelling, highProfitOnly)">
    <tr class="filter-row">
        <!--
          Display: Filterzeile bewusst unabhängig vom Spaltenlayout.
          Das verhindert Layout-Sprünge, wenn Spalten dynamisch ein-/ausgeblendet werden (z.B. Verkaufspreis bei soldOnly=true).
        -->
        <th colspan="16">
            <div class="d-flex flex-wrap align-items-center gap-3">
                <div style="min-width: 10rem;">
                    <select class="form-select form-select-sm"
                            id="setCodeFilterSelect"
                            form="tableFilterForm"
                            onchange="document.getElementById('filterSetCode').value = this.value; document.getElementById('tableFilterForm').submit()">
                        <option value="">Set wählen</option>
                        <option th:each="set : ${magicSets}"
                                th:if="${#strings.length(set.code) <= 3}"
                                th:value="${set.code}"
                                th:text="${set.code}"
                                th:selected="${param.setCode} == ${set.code}"></option>
                    </select>
                </div>

                <!-- setCode wird ausschließlich über dieses Hidden-Feld gesendet (damit nie doppelt) -->
                <input type="hidden"
                       id="filterSetCode"
                       name="setCode"
                       form="tableFilterForm"
                       th:value="${(param.setCode != null and !#lists.isEmpty(param.setCode)) ? param.setCode[0] : ''}" />

                <!-- Aktiver Set-Filter als Badge (klickbar zum Entfernen) -->
                <div th:if="${param.setCode != null and !#lists.isEmpty(param.setCode) and !#strings.isEmpty(param.setCode[0])}" class="d-flex align-items-center">
                    <button type="button"
                            class="btn btn-outline-secondary btn-sm"
                            title="Set-Filter entfernen"
                            onclick="(function(){
                              const form=document.getElementById('tableFilterForm');
                              if(!form) return;
                              // Entfernen: Dropdown + hidden Wert leeren
                              const select=document.getElementById('setCodeFilterSelect');
                              if(select) select.selectedIndex=0;
                              const hidden=document.getElementById('filterSetCode');
                              if(hidden) hidden.value='';
                              form.submit();
                            })()">
                        <span th:text="${param.setCode[0]}">SET</span>
                        <span aria-hidden="true">&nbsp;×</span>
                    </button>
                </div>

                <div style="min-width: 12rem;">
                    <select class="form-select form-select-sm"
                            id="typeFilterSelect"
                            form="tableFilterForm"
                            onchange="document.getElementById('filterType').value = this.value; document.getElementById('tableFilterForm').submit()">
                        <option value="">Typ wählen</option>
                        <option th:each="t : ${types}"
                                th:value="${t}"
                                th:text="${t}"
                                th:selected="${param.type} == ${t}"></option>
                    </select>
                </div>

                <!-- type wird ausschließlich über dieses Hidden-Feld gesendet (damit nie doppelt) -->
                <input type="hidden"
                       id="filterType"
                       name="type"
                       form="tableFilterForm"
                       th:value="${(param.type != null and !#lists.isEmpty(param.type)) ? param.type[0] : ''}" />

                <!-- Aktiver Typ-Filter als Badge (klickbar zum Entfernen) -->
                <div th:if="${param.type != null and !#lists.isEmpty(param.type) and !#strings.isEmpty(param.type[0])}" class="d-flex align-items-center">
                    <button type="button"
                            class="btn btn-outline-secondary btn-sm"
                            title="Typ-Filter entfernen"
                            onclick="(function(){
                              const form=document.getElementById('tableFilterForm');
                              if(!form) return;
                              const select=document.getElementById('typeFilterSelect');
                              if(select) select.selectedIndex=0;
                              const hidden=document.getElementById('filterType');
                              if(hidden) hidden.value='';
                              form.submit();
                            })()">
                        <span th:text="${param.type[0]}">TYPE</span>
                        <span aria-hidden="true">&nbsp;×</span>
                    </button>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="soldFilter"
                           form="tableFilterForm"
                           th:checked="${soldOnly}"
                           onchange="document.getElementById('soldOnly').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="soldFilter">Verkauft</label>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="sellingFilter"
                           form="tableFilterForm"
                           th:checked="${isSelling}"
                           onchange="document.getElementById('isSelling').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="sellingFilter">Verkaufen</label>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="highProfitFilter"
                           form="tableFilterForm"
                           th:checked="${highProfitOnly}"
                           onchange="document.getElementById('highProfitOnly').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="highProfitFilter">&gt; 1.5x</label>
                </div>
            </div>
        </th>
    </tr>
</th:block>

<!-- SecretLair-Filterzeile -->
<th:block th:fragment="secretLairFilterRow(soldOnly, isSelling, highProfitOnly)">
    <tr class="filter-row">
        <!--
          SecretLair: Filterzeile bewusst unabhängig vom Spaltenlayout.
          Wir rendern eine einzige Zelle über die komplette Tabellenbreite.
          Vorteil: keine Breitenverschiebungen/Overflow, egal wie viele Spalten (oder Meta-Spalten) sichtbar sind.
        -->
        <th colspan="14">
            <div class="d-flex flex-wrap align-items-center gap-3">
                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="soldFilter"
                           form="tableFilterForm"
                           th:checked="${soldOnly}"
                           onchange="document.getElementById('soldOnly').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="soldFilter">Verkauft</label>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="isSellingFilter"
                           form="tableFilterForm"
                           th:checked="${isSelling}"
                           onchange="document.getElementById('isSelling').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="isSellingFilter">Verkaufen</label>
                </div>

                <div class="form-check mb-0">
                    <input class="form-check-input"
                           type="checkbox"
                           id="highProfitFilter"
                           form="tableFilterForm"
                           th:checked="${highProfitOnly}"
                           onchange="document.getElementById('highProfitOnly').value = this.checked ? 'true' : 'false'; document.getElementById('tableFilterForm').submit();">
                    <label class="form-check-label" for="highProfitFilter">&gt; 1.5x</label>
                </div>
            </div>
        </th>
    </tr>
</th:block>

</body>
</html>
