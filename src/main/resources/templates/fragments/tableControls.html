<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="toggles(showIdToggle, showMetaToggle)" class="mb-3">
    <button th:if="${showIdToggle}"
            type="button"
            class="btn btn-outline-secondary btn-sm"
            onclick="toggleIdColumn()">ID-Spalte ein-/ausblenden</button>
    <button th:if="${showMetaToggle}"
            type="button"
            class="btn btn-outline-secondary btn-sm"
            onclick="toggleMetaColumns()">Meta-Spalten ein-/ausblenden</button>
</div>

<div th:fragment="summary3(label1, value1, label2, value2, label3, value3)" class="mb-3">
    <div class="d-flex flex-wrap gap-2 align-items-center">
        <span class="badge badge-lg text-bg-dark">
            <span th:text="${label1}">Summe 1:</span>
            <span th:text="${value1}"></span>
        </span>
        <span class="badge badge-lg text-bg-primary">
            <span th:text="${label2}">Summe 2:</span>
            <span th:text="${value2}"></span>
        </span>
        <span class="badge badge-lg text-bg-success">
            <span th:text="${label3}">Summe 3:</span>
            <span th:text="${value3}"></span>
        </span>
    </div>
</div>

</body>
</html>
