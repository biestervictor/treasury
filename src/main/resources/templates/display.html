<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Displays')"></head>
<body class="bg-light">
<th:block th:replace="navbarDisplay.html :: nav"></th:block>

<!-- ====== Unified toolbar: Add + toggle buttons on one line ====== -->
<div class="d-flex gap-2 flex-wrap align-items-center mb-2 mt-3 px-2">
    <span th:replace="addDisplay.html :: addFormButton"></span>
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="toggleIdColumn()">ID-Spalte ein-/ausblenden</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="toggleMetaColumns()">Meta-Spalten ein-/ausblenden</button>
</div>
<th:block th:replace="addDisplay.html :: addFormCollapse"></th:block>

<div th:replace="fragments/tableControls :: summary3('Summe Einkaufspreise:', ${sumEinkaufspreis} + ' €', 'Summe Aktueller Preise:', ${sumAktuellerPreis} + ' €', 'Gewinn bei Verkäufen:', ${sumGewinn} + ' €')"></div>

<div th:replace="fragments/tableFilters :: triStateFlags('/api/display/list', ${soldOnly}, ${isSelling}, ${highProfitOnly})"></div>
<table class="table table-striped table-hover" data-sort-order="asc" id="displayTable">
    <thead>
    <th:block th:replace="fragments/theadHeaders :: displayHeaderRow"></th:block>
    <th:block th:replace="fragments/theadFilters :: displayFilterRow(${types}, ${soldOnly}, ${isSelling}, ${highProfitOnly})"></th:block>
    </thead>
    <tbody>
    <tr th:each="display,iter : ${displays}" class="clickable-row"
        th:attr="data-id=${display.id},
                 data-setcode=${display.setCode},
                 data-type=${display.type},
                 data-name=${display.name},
                 data-valuebought=${display.valueBought},
                 data-currentvalue=${display.currentValue},
                 data-location=${display.location},
                 data-updatedAt=${#temporals.format(display.updatedAt, 'yyyy-MM-dd HH:mm')},
                 data-sold=${display.sold},
                 data-selling=${display.selling},
                 data-soldprice=${display.soldPrice},
                 data-solddate=${display.soldDate != null ? #temporals.format(display.soldDate, 'yyyy-MM-dd') : ''},
                 data-language=${display.language},
                 data-vendor=${display.vendor},
                 data-datebought=${#temporals.format(display.dateBought, 'yyyy-MM-dd')},
                 data-url=${display.url}">
        <td class="id-column hidden" th:text="${display.id}"></td>
        <td th:text="${display.setCode}"></td>
        <td>
            <img alt="Icon" style="width: 32px; height: 32px;"
                 th:src="${setCodeToIconUri[display.setCode] != null ? setCodeToIconUri[display.setCode] : ''}">
        </td>
        <td th:text="${display.type}"></td>
        <td th:text="${display.name}"></td>
        <td>
            <button class="btn btn-outline-info btn-sm"
                    th:attr="data-id=${display.id}, data-name=${display.setCode + ' ' + display.type}"
                    onclick="showPriceChart(this, event)">Verlauf</button>
        </td>
        <td class="text-end text-muted" style="font-variant-numeric: tabular-nums;" th:text="${display.valueBought}"></td>
        <td th:if="${display.currentValue != null}"
            class="text-end text-nowrap small"
            style="font-variant-numeric: tabular-nums; line-height: 1.1;"
            th:text="${display.currentValue}"
            th:classappend="${display.currentValue > display.valueBought * 1.5} ? 'text-primary' : (${display.currentValue > display.valueBought} ? 'text-success' : '')">
        </td>
        <td th:if="${display.currentValue == null}"
            class="text-end text-muted text-nowrap small"
            style="font-variant-numeric: tabular-nums; line-height: 1.1;">–</td>
        <td th:text="${display.location}"></td>
        <td class="text-nowrap text-muted"
            style="width: 10.5rem; font-variant-numeric: tabular-nums;"
            th:text="${#temporals.format(display.updatedAt, 'yyyy-MM-dd')}"></td>
        <td class="meta-column hidden" th:text="${display.sold}"></td>
        <td class="hidden soldprice-column text-end text-muted" style="font-variant-numeric: tabular-nums;" th:text="${display.soldPrice}"></td>
        <td th:text="${display.language}"></td>
        <td class="meta-column hidden" th:text="${display.vendor}"></td>
        <td class="meta-column hidden" th:text="${#temporals.format(display.dateBought, 'yyyy-MM-dd')}"></td>
        <td class="meta-column hidden" th:if="${display.url != null}">
            <a th:href="${display.url}" th:text="${display.url}"></a>
        </td>
        <td class="meta-column hidden" th:if="${display.url == null}">–</td>
        <td>
            <ul>
                <li th:each="angebot, iterStat : ${display.angebotList}"
                    th:if="${iterStat.index} < 3"
                    th:text="${angebot.name + ' - ' + angebot.preis + ' €'}"></li>
            </ul>
        </td>
        <td class="text-end">
            <button class="btn btn-outline-secondary btn-sm open-edit-btn"
                    title="Bearbeiten"
                    onclick="event.stopPropagation()">&#9998;</button>
        </td>
    </tr>
    </tbody>
</table>
<div th:replace="fragments/pagination :: paginationBar('displayTable')"></div>

<!-- Edit-Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <form action="/api/display/update" method="post" id="editForm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalTitle">Display bearbeiten</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="modalId" />
                    <input type="hidden" name="setCode" id="modalSetCode" />
                    <input type="hidden" name="type" id="modalType" />
                    <input type="hidden" name="name" id="modalName" />
                    <input type="hidden" name="currentValue" id="modalCurrentValue" />

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="modalLocation" class="form-label">Lagerort</label>
                            <input type="text" class="form-control" name="location" id="modalLocation" />
                        </div>
                        <div class="col-md-6">
                            <label for="modalLanguage" class="form-label">Sprache</label>
                            <input type="text" class="form-control" name="language" id="modalLanguage" />
                        </div>
                        <div class="col-md-6">
                            <label for="modalValueBought" class="form-label">Einkaufspreis (€)</label>
                            <input type="number" class="form-control" name="valueBought" id="modalValueBought" step="0.01" min="0" />
                        </div>
                        <div class="col-md-6">
                            <label for="modalVendor" class="form-label">Händler</label>
                            <input type="text" class="form-control" name="vendor" id="modalVendor" />
                        </div>
                        <div class="col-md-6">
                            <label for="modalDateBought" class="form-label">Kaufdatum</label>
                            <input type="date" class="form-control" name="dateBought" id="modalDateBought" />
                        </div>
                        <div class="col-md-6">
                            <label for="modalUrl" class="form-label">Cardmarket URL</label>
                            <input type="text" class="form-control" name="url" id="modalUrl" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label d-block">Status</label>
                            <div class="form-check form-check-inline">
                                <input type="checkbox" class="form-check-input" name="sold" id="modalSold" />
                                <label class="form-check-label" for="modalSold">Verkauft</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input type="checkbox" class="form-check-input" name="selling" id="modalSelling" />
                                <label class="form-check-label" for="modalSelling">Zum Verkauf</label>
                            </div>
                        </div>
                        <div class="col-md-6" id="soldFieldsGroup">
                            <label for="modalSoldPrice" class="form-label">Verkaufspreis (€)</label>
                            <input type="number" class="form-control mb-2" name="soldPrice" id="modalSoldPrice" step="0.01" min="0" />
                            <label for="modalSoldDate" class="form-label">Verkaufsdatum</label>
                            <input type="date" class="form-control" name="soldDate" id="modalSoldDate" />
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="submit" class="btn btn-success">Speichern</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Preisverlauf-Modal -->
<div class="modal fade" id="priceChartModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="priceChartTitle">Preisverlauf</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <canvas id="priceChartCanvas" height="120"></canvas>
                <p id="priceChartEmpty" class="text-muted text-center d-none mt-3">
                    Noch keine Preishistorie verfügbar. Daten werden ab dem nächsten Scraper-Lauf gespeichert.
                </p>
                <hr id="priceChartGroupHr" class="my-3" style="display:none">
                <h6 class="fw-semibold mb-2" id="priceChartGroupLabel" style="display:none">Positionen</h6>
                <div id="priceChartGroupTable" class="table-responsive" style="display:none">
                    <table class="table table-sm table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Lagerort</th>
                            <th class="text-end">EK-Preis (€)</th>
                            <th class="text-end">Marktwert (€)</th>
                            <th class="text-end">Gewinn (€)</th>
                            <th>Sprache</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody id="priceChartGroupRows"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function sortTable(columnIndex) {
        const table = document.getElementById("displayTable");
        const rows = Array.from(table.tBodies[0].rows);
        const isAscending = table.getAttribute("data-sort-order") === "asc";
        const direction = isAscending ? 1 : -1;
        rows.sort((a, b) => {
            const aText = a.cells[columnIndex].innerText.trim();
            const bText = b.cells[columnIndex].innerText.trim();
            return aText.localeCompare(bText) * direction;
        });
        rows.forEach(row => table.tBodies[0].appendChild(row));
        table.setAttribute("data-sort-order", isAscending ? "desc" : "asc");
        _renderPage('displayTable');
    }

    function openEditModal(row) {
        document.getElementById('editModalTitle').textContent =
            'Display bearbeiten: ' + row.getAttribute('data-setcode') + ' ' + row.getAttribute('data-type');
        document.getElementById('modalId').value = row.getAttribute('data-id');
        document.getElementById('modalSetCode').value = row.getAttribute('data-setcode');
        document.getElementById('modalType').value = row.getAttribute('data-type');
        document.getElementById('modalName').value = row.getAttribute('data-name');
        document.getElementById('modalCurrentValue').value = row.getAttribute('data-currentvalue');
        document.getElementById('modalLocation').value = row.getAttribute('data-location');
        document.getElementById('modalLanguage').value = row.getAttribute('data-language');
        document.getElementById('modalValueBought').value = row.getAttribute('data-valuebought') || '';
        document.getElementById('modalVendor').value = row.getAttribute('data-vendor') || '';
        document.getElementById('modalDateBought').value = row.getAttribute('data-datebought') || '';
        document.getElementById('modalUrl').value = row.getAttribute('data-url') || '';
        document.getElementById('modalSold').checked = row.getAttribute('data-sold') === 'true';
        document.getElementById('modalSelling').checked = row.getAttribute('data-selling') === 'true';
        document.getElementById('modalSoldPrice').value = row.getAttribute('data-soldprice') || '';
        document.getElementById('modalSoldDate').value = row.getAttribute('data-solddate') || '';
        new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    document.addEventListener('DOMContentLoaded', function () {
        // Explicit edit button
        document.querySelectorAll('.open-edit-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const row = btn.closest('tr');
                openEditModal(row);
            });
        });
        // Keep row-click behaviour for convenience
        document.querySelectorAll('.clickable-row').forEach(function(row) {
            row.addEventListener('click', function() {
                openEditModal(row);
            });
        });
        initPagination('displayTable');
    });
</script>

<div th:replace="fragments/scripts :: toggleScripts"></div>
<th:block th:replace="fragments/pagination :: paginationScript"></th:block>
<th:block th:replace="fragments/layout :: bootstrapJs"></th:block>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    let displayPriceChart = null;

    function showPriceChart(btn, event) {
        event.stopPropagation();
        const id = btn.getAttribute('data-id');
        const name = btn.getAttribute('data-name');
        document.getElementById('priceChartTitle').textContent = 'Preisverlauf: ' + name;
        const canvas = document.getElementById('priceChartCanvas');
        const empty = document.getElementById('priceChartEmpty');

        document.getElementById('priceChartGroupHr').style.display = 'none';
        document.getElementById('priceChartGroupLabel').style.display = 'none';
        document.getElementById('priceChartGroupTable').style.display = 'none';

        Promise.all([
            fetch('/api/display/' + id + '/history').then(r => r.json()),
            fetch('/api/display/' + id + '/group').then(r => r.json())
        ]).then(([histData, groupData]) => {
            if (displayPriceChart) {
                displayPriceChart.destroy();
                displayPriceChart = null;
            }
            if (!histData || histData.length === 0) {
                canvas.style.display = 'none';
                empty.classList.remove('d-none');
            } else {
                canvas.style.display = '';
                empty.classList.add('d-none');
                displayPriceChart = new Chart(canvas.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: histData.map(d => d.date),
                        datasets: [{
                            label: 'Preis (€)',
                            data: histData.map(d => d.price),
                            borderColor: '#0d6efd',
                            backgroundColor: 'rgba(13,110,253,0.08)',
                            fill: true,
                            tension: 0.2,
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: ctx => ' ' + ctx.parsed.y.toFixed(2).replace('.', ',') + ' €'
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false,
                                ticks: { callback: v => v.toFixed(2).replace('.', ',') + ' €' }
                            }
                        }
                    }
                });
            }
            if (groupData && groupData.items && groupData.items.length > 0) {
                document.getElementById('priceChartGroupHr').style.display = '';
                const lbl = document.getElementById('priceChartGroupLabel');
                lbl.textContent = 'Positionen (' + groupData.items.length + ')';
                lbl.style.display = '';
                document.getElementById('priceChartGroupTable').style.display = '';
                document.getElementById('priceChartGroupRows').innerHTML =
                    groupData.items.map(item => {
                        const profit = item.profit;
                        const cls = profit >= 0 ? 'text-success' : 'text-danger';
                        const sign = profit >= 0 ? '+' : '';
                        const loc = item.location || '\u2013';
                        const lang = item.language || '\u2013';
                        const cm = item.url
                            ? '<a href="' + item.url
                            + '" target="_blank" rel="noopener"'
                            + ' class="btn btn-sm btn-outline-secondary py-0 px-1">CM</a>'
                            : '';
                        const fmt = v => v.toFixed(2).replace('.', ',');
                        return '<tr>'
                            + '<td>' + loc + '</td>'
                            + '<td class="text-end font-monospace">' + fmt(item.valueBought) + '</td>'
                            + '<td class="text-end font-monospace">' + fmt(item.currentValue) + '</td>'
                            + '<td class="text-end font-monospace fw-semibold ' + cls + '">'
                            + sign + fmt(profit) + '</td>'
                            + '<td>' + lang + '</td>'
                            + '<td>' + cm + '</td>'
                            + '</tr>';
                    }).join('');
            }
            new bootstrap.Modal(document.getElementById('priceChartModal')).show();
        }).catch(() => {
            canvas.style.display = 'none';
            empty.classList.remove('d-none');
            empty.textContent = 'Fehler beim Laden der Preishistorie.';
            new bootstrap.Modal(document.getElementById('priceChartModal')).show();
        });
    }
</script>
</body>
</html>
