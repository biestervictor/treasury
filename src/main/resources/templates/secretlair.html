<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Secret Lairs')"></head>
<body class="bg-light">
<th:block th:replace="secretLairNavbar.html :: nav"></th:block>

<!-- ====== Unified toolbar: Add + toggle buttons on one line ====== -->
<div class="d-flex gap-2 flex-wrap align-items-center mb-2 mt-3 px-2">
    <span th:replace="addSecretLair.html :: addFormButton"></span>
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="toggleIdColumn()">ID-Spalte ein-/ausblenden</button>
    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="toggleMetaColumns()">Meta-Spalten ein-/ausblenden</button>
</div>
<th:block th:replace="addSecretLair.html :: addFormCollapse"></th:block>

<div th:replace="fragments/tableControls :: summary3('Summe Einkaufspreis:', ${sumEinkaufspreis} + ' €', 'Summe aktueller Wert:', ${sumAktuellerWert} + ' €', 'Gewinn bei Verkäufen:', ${sumGewinn} + ' €')"></div>

<div th:replace="fragments/tableFilters :: triStateFlags('/api/secretlair/insert', ${soldOnly}, ${isSelling}, ${highProfitOnly})"></div>

<div class="table-responsive">
<table class="table table-striped table-hover" id="secretLairTable">
    <thead>
    <th:block th:replace="fragments/theadHeaders :: secretLairHeaderRow"></th:block>
    <th:block th:replace="fragments/theadFilters :: secretLairFilterRow(${soldOnly}, ${isSelling}, ${highProfitOnly})"></th:block>
    </thead>
    <tbody>
    <tr th:each="sl : ${secretlair}" class="clickable-row"
        th:attr="data-id=${sl.id},
                 data-location=${sl.location},
                 data-currentvalue=${sl.currentValue},
                 data-issold=${sl.sold},
                 data-selling=${sl.selling},
                 data-soldprice=${sl.soldPrice},
                 data-datebought=${#temporals.format(sl.dateBought, 'yyyy-MM-dd')}">
        <td class="id-column hidden" th:text="${sl.id}"></td>
        <td class="meta-column hidden" th:text="${sl.deck ? 'Ja' : 'Nein'}"></td>
        <td class="text-end text-muted" style="font-variant-numeric: tabular-nums;" th:text="${sl.valueBought}"></td>
        <td class="meta-column hidden" th:text="${#temporals.format(sl.dateBought, 'yyyy-MM-dd')}"></td>
        <td th:text="${sl.name}"></td>
        <td>
            <button class="btn btn-outline-info btn-sm"
                    th:attr="data-id=${sl.id}, data-name=${sl.name}"
                    onclick="showPriceChart(this, event)">Verlauf</button>
        </td>
        <td class="text-nowrap text-muted th-w-date"
            style="font-variant-numeric: tabular-nums;"
            th:text="${#temporals.format(sl.updatedAt, 'yyyy-MM-dd')}"></td>
        <td class="text-end text-nowrap small th-w-money"
            style="font-variant-numeric: tabular-nums; line-height: 1.1;"
            th:text="${sl.currentValue}"
            th:classappend="${sl.currentValue > sl.valueBought} ? 'text-success' : ''"></td>
        <td th:text="${sl.location}"></td>
        <td class="meta-column hidden"><a th:href="${sl.url}" th:text="${sl.url}"></a></td>
        <td th:text="${sl.foil ? 'Ja' : 'Nein'}"></td>
        <td class="meta-column hidden" th:text="${sl.sold ? 'Ja' : 'Nein'}"></td>
        <td class="hidden soldprice-column text-end text-muted" style="font-variant-numeric: tabular-nums;" th:text="${sl.soldPrice}"></td>
        <td class="meta-column hidden" th:text="${sl.selling ? 'Ja' : 'Nein'}"></td>
        <td class="meta-column hidden text-end text-nowrap small th-w-profit"
            style="font-variant-numeric: tabular-nums; line-height: 1.1;"
            th:text="${sl.sold} ? (${sl.soldPrice - sl.valueBought}) : ''"
            th:classappend="${sl.sold and (sl.soldPrice - sl.valueBought) > 0} ? 'text-success' : (${sl.sold and (sl.soldPrice - sl.valueBought) < 0} ? 'text-danger' : '')"></td>
        <td>
            <ul class="list-unstyled mb-0 small">
                <li th:each="angebot : ${sl.angebotList}" th:text="${angebot.name + ' - ' + angebot.preis + ' €'}"></li>
            </ul>
        </td>
    </tr>
    </tbody>
</table>
</div>
<div th:replace="fragments/pagination :: paginationBar('secretLairTable')"></div>

<!-- Edit-Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <form action="/api/secretlair/update" method="post" id="editForm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Secret Lair bearbeiten</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="modalId" />
                    <div class="mb-3">
                        <label for="modalLocation" class="form-label">Lagerort</label>
                        <input type="text" class="form-control" name="location" id="modalLocation" />
                    </div>
                    <div class="mb-3">
                        <label for="modalCurrentValue" class="form-label">Aktueller Wert</label>
                        <input type="number" class="form-control" name="currentValue" id="modalCurrentValue" step="0.01" />
                    </div>
                    <div class="mb-3">
                        <label for="modalIsSold" class="form-label">Verkauft</label>
                        <input type="checkbox" name="isSold" id="modalIsSold" />
                    </div>
                    <div class="mb-3">
                        <label for="modalSelling" class="form-label">Verkaufen</label>
                        <input type="checkbox" name="selling" id="modalSelling" />
                    </div>
                    <div class="mb-3">
                        <label for="modalSoldPrice" class="form-label">Verkaufspreis</label>
                        <input type="number" class="form-control" name="soldPrice" id="modalSoldPrice" step="0.01" />
                    </div>
                    <div class="mb-3">
                        <label for="modalDateBought" class="form-label">Kaufdatum</label>
                        <input type="date" class="form-control" name="dateBought" id="modalDateBought" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Speichern</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Preisverlauf-Modal -->
<div class="modal fade" id="priceChartModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="priceChartTitle">Preisverlauf</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <canvas id="priceChartCanvas" height="120"></canvas>
                <p id="priceChartEmpty" class="text-muted text-center d-none mt-3">
                    Noch keine Preishistorie verfügbar. Daten werden ab dem nächsten Scraper-Lauf gespeichert.
                </p>
                <hr id="priceChartGroupHr" class="my-3" style="display:none">
                <h6 class="fw-semibold mb-2" id="priceChartGroupLabel" style="display:none">Positionen</h6>
                <div id="priceChartGroupTable" class="table-responsive" style="display:none">
                    <table class="table table-sm table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Lagerort</th>
                            <th class="text-end">EK-Preis (€)</th>
                            <th class="text-end">Marktwert (€)</th>
                            <th class="text-end">Gewinn (€)</th>
                            <th>Sprache</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody id="priceChartGroupRows"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.clickable-row').forEach(function(row) {
            row.addEventListener('click', function() {
                document.getElementById('modalId').value = row.getAttribute('data-id');
                document.getElementById('modalLocation').value = row.getAttribute('data-location');
                document.getElementById('modalCurrentValue').value = row.getAttribute('data-currentvalue');
                document.getElementById('modalIsSold').checked = row.getAttribute('data-issold') === 'true';
                document.getElementById('modalSelling').checked = row.getAttribute('data-selling') === 'true';
                document.getElementById('modalSoldPrice').value = row.getAttribute('data-soldprice') || '';
                document.getElementById('modalDateBought').value = row.getAttribute('data-datebought');
                new bootstrap.Modal(document.getElementById('editModal')).show();
            });
        });
        initPagination('secretLairTable');
    });
</script>

<div th:replace="fragments/scripts :: toggleScripts"></div>
<th:block th:replace="fragments/pagination :: paginationScript"></th:block>
<th:block th:replace="fragments/layout :: bootstrapJs"></th:block>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    let slPriceChart = null;

    function showPriceChart(btn, event) {
        event.stopPropagation();
        const id = btn.getAttribute('data-id');
        const name = btn.getAttribute('data-name');
        document.getElementById('priceChartTitle').textContent = 'Preisverlauf: ' + name;
        const canvas = document.getElementById('priceChartCanvas');
        const empty = document.getElementById('priceChartEmpty');

        document.getElementById('priceChartGroupHr').style.display = 'none';
        document.getElementById('priceChartGroupLabel').style.display = 'none';
        document.getElementById('priceChartGroupTable').style.display = 'none';

        Promise.all([
            fetch('/api/secretlair/' + id + '/history').then(r => r.json()),
            fetch('/api/secretlair/' + id + '/group').then(r => r.json())
        ]).then(([histData, groupData]) => {
            if (slPriceChart) {
                slPriceChart.destroy();
                slPriceChart = null;
            }
            if (!histData || histData.length === 0) {
                canvas.style.display = 'none';
                empty.classList.remove('d-none');
            } else {
                canvas.style.display = '';
                empty.classList.add('d-none');
                slPriceChart = new Chart(canvas.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: histData.map(d => d.date),
                        datasets: [{
                            label: 'Preis (€)',
                            data: histData.map(d => d.price),
                            borderColor: '#198754',
                            backgroundColor: 'rgba(25,135,84,0.08)',
                            fill: true,
                            tension: 0.2,
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: ctx => ' ' + ctx.parsed.y.toFixed(2).replace('.', ',') + ' €'
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false,
                                ticks: { callback: v => v.toFixed(2).replace('.', ',') + ' €' }
                            }
                        }
                    }
                });
            }
            if (groupData && groupData.items && groupData.items.length > 0) {
                document.getElementById('priceChartGroupHr').style.display = '';
                const lbl = document.getElementById('priceChartGroupLabel');
                lbl.textContent = 'Positionen (' + groupData.items.length + ')';
                lbl.style.display = '';
                document.getElementById('priceChartGroupTable').style.display = '';
                document.getElementById('priceChartGroupRows').innerHTML =
                    groupData.items.map(item => {
                        const profit = item.profit;
                        const cls = profit >= 0 ? 'text-success' : 'text-danger';
                        const sign = profit >= 0 ? '+' : '';
                        const loc = item.location || '\u2013';
                        const lang = item.language || '\u2013';
                        const cm = item.url
                            ? '<a href="' + item.url
                            + '" target="_blank" rel="noopener"'
                            + ' class="btn btn-sm btn-outline-secondary py-0 px-1">CM</a>'
                            : '';
                        const fmt = v => v.toFixed(2).replace('.', ',');
                        return '<tr>'
                            + '<td>' + loc + '</td>'
                            + '<td class="text-end font-monospace">' + fmt(item.valueBought) + '</td>'
                            + '<td class="text-end font-monospace">' + fmt(item.currentValue) + '</td>'
                            + '<td class="text-end font-monospace fw-semibold ' + cls + '">'
                            + sign + fmt(profit) + '</td>'
                            + '<td>' + lang + '</td>'
                            + '<td>' + cm + '</td>'
                            + '</tr>';
                    }).join('');
            }
            new bootstrap.Modal(document.getElementById('priceChartModal')).show();
        }).catch(() => {
            canvas.style.display = 'none';
            empty.classList.remove('d-none');
            empty.textContent = 'Fehler beim Laden der Preishistorie.';
            new bootstrap.Modal(document.getElementById('priceChartModal')).show();
        });
    }
</script>
</body>
</html>
