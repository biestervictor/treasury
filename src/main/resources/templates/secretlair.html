<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Secret Lairs')"></head>
<body class="bg-light">
<th:block th:replace="secretLairNavbar.html :: nav"></th:block>
<div th:replace="addSecretLair.html :: addForm"></div>

<div th:replace="fragments/tableControls :: toggles(true, true)"></div>
<!-- Direkt unter <div class="mb-3"> ... </div> -->

<div th:replace="fragments/tableControls :: summary3('Summe Einkaufspreis:', ${sumEinkaufspreis} + ' €', 'Summe aktueller Wert:', ${sumAktuellerWert} + ' €', 'Gewinn bei Verkäufen:', ${sumGewinn} + ' €')"></div>

<div th:replace="fragments/tableFilters :: triStateFlags('/api/secretlair/insert', ${soldOnly}, ${isSelling}, ${highProfitOnly})"></div>

<div class="table-responsive">
<table class="table table-striped table-hover" id="secretLairTable" >
    <thead>
    <th:block th:replace="fragments/theadHeaders :: secretLairHeaderRow"></th:block>
    <th:block th:replace="fragments/theadFilters :: secretLairFilterRow(${soldOnly}, ${isSelling}, ${highProfitOnly})"></th:block>
    </thead>
    <tbody>
    <tr th:each="sl : ${secretlair}" class="clickable-row"
        th:attr="data-id=${sl.id},
                 data-location=${sl.location},
                 data-currentvalue=${sl.currentValue},
                 data-issold=${sl.sold},
                 data-selling=${sl.selling},
                 data-soldprice=${sl.soldPrice},
                 data-datebought=${#temporals.format(sl.dateBought, 'yyyy-MM-dd')}">
        <td class="id-column hidden" th:text="${sl.id}"></td>
        <td  class="meta-column hidden" th:text="${sl.deck ? 'Ja' : 'Nein'}"></td>
        <td class="text-end text-muted" style="font-variant-numeric: tabular-nums;" th:text="${sl.valueBought}"></td>
        <td class="meta-column hidden" th:text="${#temporals.format(sl.dateBought, 'yyyy-MM-dd')}"></td>
        <td th:text="${sl.name}"></td>
        <td class="text-nowrap text-muted th-w-date"
            style="font-variant-numeric: tabular-nums;"
            th:text="${#temporals.format(sl.updatedAt, 'yyyy-MM-dd')}"></td>
        <td class="text-end text-nowrap small th-w-money"
            style="font-variant-numeric: tabular-nums; line-height: 1.1;"
            th:text="${sl.currentValue}"
            th:classappend="${sl.currentValue > sl.valueBought} ? 'text-success' : ''"></td>
        <td th:text="${sl.location}"></td>
        <td class="meta-column hidden"><a th:href="${sl.url}" th:text="${sl.url}"></a></td>
        <td th:text="${sl.foil ? 'Ja' : 'Nein'}"></td>
        <td class="meta-column hidden" th:text="${sl.sold ? 'Ja' : 'Nein'}"></td>
        <td class="hidden soldprice-column text-end text-muted" style="font-variant-numeric: tabular-nums;" th:text="${sl.soldPrice}"></td>
        <td class="meta-column hidden" th:text="${sl.selling ? 'Ja' : 'Nein'}"></td>
        <td class="meta-column hidden text-end text-nowrap small th-w-profit"
            style="font-variant-numeric: tabular-nums; line-height: 1.1;"
            th:text="${sl.sold} ? (${sl.soldPrice - sl.valueBought}) : ''"
            th:classappend="${sl.sold and (sl.soldPrice - sl.valueBought) > 0} ? 'text-success' : (${sl.sold and (sl.soldPrice - sl.valueBought) < 0} ? 'text-danger' : '')"></td>
        <td>
            <ul class="list-unstyled mb-0 small">
                <li th:each="angebot : ${sl.angebotList}" th:text="${angebot.name + ' - ' + angebot.preis + ' €'}"></li>
            </ul>
        </td>
    </tr>
    </tbody>
</table>
</div>

<!-- Modal für Bearbeitung -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <form action="/api/secretlair/update" method="post" id="editForm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Secret Lair bearbeiten</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="modalId" />
                    <div class="mb-3">
                        <label for="modalLocation" class="form-label">Lagerort</label>
                        <input type="text" class="form-control" name="location" id="modalLocation" />
                    </div>
                    <div class="mb-3">
                        <label for="modalCurrentValue" class="form-label">Aktueller Wert</label>
                        <input type="number" class="form-control" name="currentValue" id="modalCurrentValue" step="0.01" />
                    </div>
                    <div class="mb-3">
                        <label for="modalIsSold" class="form-label">Verkauft</label>
                        <input type="checkbox" name="isSold" id="modalIsSold" />
                    </div>
                    <div class="mb-3">
                        <label for="modalSelling" class="form-label">Verkaufen</label>
                        <input type="checkbox" name="selling" id="modalSelling" />
                    </div>
                    <div class="mb-3">
                        <label for="modalSoldPrice" class="form-label">Verkaufspreis</label>
                        <input type="number" class="form-control" name="soldPrice" id="modalSoldPrice" step="0.01" />
                    </div>
                    <div class="mb-3">
                        <label for="modalDateBought" class="form-label">Kaufdatum</label>
                        <input type="date" class="form-control" name="dateBought" id="modalDateBought" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Speichern</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.clickable-row').forEach(function(row) {
            row.addEventListener('click', function() {
                document.getElementById('modalId').value = row.getAttribute('data-id');
                document.getElementById('modalLocation').value = row.getAttribute('data-location');
                document.getElementById('modalCurrentValue').value = row.getAttribute('data-currentvalue');
                document.getElementById('modalIsSold').checked = row.getAttribute('data-issold') === 'true';
                document.getElementById('modalSelling').checked = row.getAttribute('data-selling') === 'true';
                document.getElementById('modalSoldPrice').value = row.getAttribute('data-soldprice') || '';
                document.getElementById('modalDateBought').value = row.getAttribute('data-datebought');
                new bootstrap.Modal(document.getElementById('editModal')).show();
            });
        });
    });
</script>

<div th:replace="fragments/scripts :: toggleScripts"></div>
<th:block th:replace="fragments/layout :: bootstrapJs"></th:block>
</body>
</html>
