<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Schuhe')"></head>
<body class="bg-light">
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Schuhverwaltung</a>
        <button aria-controls="navbarNav" aria-expanded="false" aria-label="Navigation umschalten"
                class="navbar-toggler"
                data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/shoe/list}">Schuh-Liste</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/shoe/insert}">Schuhe importieren</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/menue/index}">Hauptmenü</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/api/settings}">
                        Settings
                        <span class="badge bg-success" th:if="${jobsAllEnabled}">Jobs: ON</span>
                        <span class="badge bg-danger" th:if="${jobsAnyDisabled}">Jobs: OFF</span>
                    </a>
                </li>
            </ul>

            <th:block th:replace="fragments/buildDbBadges :: badges"></th:block>
        </div>
    </div>
</nav>

<!-- Hauptinhalt -->
<div class="container mt-5">
    <h1 class="text-center mb-4">Menü</h1>
    <div class="text-center">
        <a class="btn btn-outline-primary btn-lg m-2" href="/api/shoe/list">Zur Schuh-Liste</a>
        <a class="btn btn-outline-success btn-lg m-2" href="/api/shoe/insert">Zu Schuhe importieren</a>
    </div>
</div>

<th:block th:replace="fragments/layout :: bootstrapJs"></th:block>
</body>
</html>
