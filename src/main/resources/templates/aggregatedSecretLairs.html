<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Aggregierte Secret Lairs')"></head>
<body class="bg-light">

<th:block th:replace="secretLairNavbar.html :: nav"></th:block>

<div class="container-fluid mt-4 px-4">

    <!-- Totals row -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <div class="text-muted small mb-1">Gesamtausgaben</div>
                    <div class="fs-4 fw-bold text-dark"
                         th:text="${#numbers.formatDecimal(totalExpenses, 1, 'COMMA', 2, 'POINT')} + ' €'">
                        0,00 €
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <div class="text-muted small mb-1">Aktueller Gesamtwert</div>
                    <div class="fs-4 fw-bold"
                         th:classappend="${currentValue >= totalExpenses} ? 'text-success' : 'text-danger'"
                         th:text="${#numbers.formatDecimal(currentValue, 1, 'COMMA', 2, 'POINT')} + ' €'">
                        0,00 €
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Card grid -->
    <div class="row g-3">
        <div th:each="entry : ${aggregatedData}" class="col-6 col-sm-4 col-md-3 col-lg-2">
            <a th:href="@{/api/secretlair/insert}" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 text-center p-1"
                     th:style="${entry.currentValue >= entry.averagePrice * 1.5}
                                ? 'background-color:rgba(13,110,253,0.12)'
                                : (${entry.currentValue > entry.averagePrice}
                                   ? 'background-color:rgba(25,135,84,0.12)'
                                   : 'background-color:rgba(220,53,69,0.10)')">
                    <div class="card-body p-2 d-flex flex-column align-items-center">

                        <!-- Product image or gradient placeholder -->
                        <div th:if="${entry.imageUrl != null and !#strings.isEmpty(entry.imageUrl)}"
                             class="mb-2">
                            <img th:src="${entry.imageUrl}" alt="Secret Lair"
                                 style="width:56px;height:56px;object-fit:contain;border-radius:6px;">
                        </div>
                        <div th:unless="${entry.imageUrl != null and !#strings.isEmpty(entry.imageUrl)}"
                             class="mb-2 d-flex align-items-center justify-content-center fw-bold text-white"
                             style="width:56px;height:56px;border-radius:6px;
                                    background:linear-gradient(135deg,#6c5ce7,#a29bfe);
                                    font-size:1.1rem;">
                            <span th:text="${#strings.substring(entry.name, 0, 2).toUpperCase()}">SL</span>
                        </div>

                        <div class="fw-semibold small text-dark text-truncate w-100"
                             style="max-width:120px;"
                             th:text="${entry.name}">Name</div>
                        <span class="badge text-bg-secondary mb-2"
                              th:text="${entry.count} + ' Stk'">0 Stk</span>
                        <div class="text-muted mb-1" style="font-size:0.72rem;">
                            Ø EK: <span th:text="${#numbers.formatDecimal(entry.averagePrice, 1, 'COMMA', 2, 'POINT')} + ' €'">0,00 €</span>
                        </div>
                        <div class="fw-bold small mt-auto"
                             th:classappend="${entry.currentValue >= entry.averagePrice * 1.5}
                                             ? 'text-primary'
                                             : (${entry.currentValue > entry.averagePrice}
                                                ? 'text-success'
                                                : 'text-danger')"
                             th:text="${#numbers.formatDecimal(entry.currentValue, 1, 'COMMA', 2, 'POINT')} + ' €'">
                            0,00 €
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

</div>

<th:block th:replace="fragments/layout :: bootstrapJs"></th:block>
</body>
</html>
