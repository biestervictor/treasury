## MongoDB configuration
mongodb:
  # In Prod kein In-Cluster StatefulSet – Treasury verbindet sich mit dem externen Host (.141).
  # In Dev auf true setzen (values-dev.yaml), damit der In-Cluster StatefulSet deployt wird.
  enabled: false
  name: mongodb
  statefulset:
    image:
      name: mongo
      tag: 4.4.18
    port: 27017
    replicaCount: 1
    mountPath: /data/db
  service:
    port: 27017
    type: LoadBalancer
  volumeClaimTemplates:
    name: mongo-storage
    resources:
      requests:
        storage: 3Gi
  # Verbindungskonfiguration für die Treasury Spring Boot App
  app:
    host: 192.168.178.141
    port: 27017
    database: treasury
    # auth: true  → ExternalSecret wird angelegt, SPRING_MONGODB_URI kommt aus Secret
    # auth: false → SPRING_MONGODB_URI wird direkt als Env-Var gesetzt (kein Secret nötig)
    auth: true
volume:
  accessModes: ReadWriteOnce
  capacity:
    storage: 10Gi
  storageClassNameEnabled: false
ingress:
  className: nginx
  pathType: ImplementationSpecific
secretstore:
  name: azure-kv
  tenantId: "71b67176-40e1-4d4e-80fe-9251918425b2"
  vaultUrl: "https://treasurykeyvault.vault.azure.net/"
servicePrincipal:
  name: azure-sp
## Treasury
imagePullSecret: ChangeIt
treasury:
  name: treasury
  nameSpace: treasury
  image:
    name: ghcr.io/biestervictor/treasury
    tag: "1206f9b79d933ae17959ec903d11e6d8e7c470cc"
  timezone: Europe/Berlin
  build:
    version: 0.0.48
    time: "2026-05-04 13:19 UTC"
  secrets: my-tls-secret
  tls:
    certKey: tls-crt
    keyKey: tls-key
  ingress:
    host: treasury-kubitos.biester.vip
    tlsEnabled: true
  imagePullSecretDecodingStrategy: Base64
## Hedgedoc configuration
hedgedoc:
  # hedgedoczwei (hedgedoczwei.tf) ist die Ablösung – alte Instanz deaktiviert
  enabled: false
  nodeSelector:
    storage: master
  name: hedgedoc
  nameSpace: hedgedoc
  secrets: my-tls-secret
  database:
    internal:
      enabled: false
      host: hedgedoc-db
      port: 5432
      name: hedgedoc
      user: hedgedoc
      password: password
    external:
      enabled: true
      host: ""
      port: 5432
      name: hedgedoc
      userKey: username
      passwordKey: password
      secretName: hedgedoc-db-credentials
      sslmode: prefer
  mountPath: /data/hedgedoc
  volumeClaimTemplates:
    resources:
      requests:
        storage: 1Gi
  deployment:
    port: 3000
  service:
    type: ClusterIP
    port: 3000
    nodePort: 30000
    nodePortEnabled: false
  ingress:
    host: hedgedoc-kubitos.biester.vip
    tlsEnabled: true
