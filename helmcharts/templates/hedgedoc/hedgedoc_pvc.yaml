{{- if .Values.hedgedoc.enabled }}
{{- if .Values.hedgedoc.database.internal.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.hedgedoc.name }}-db-pvc
  namespace: {{ .Values.hedgedoc.nameSpace }}
spec:
  accessModes:
    - {{ .Values.volume.accessModes }}
  resources:
    requests:
      storage: {{ .Values.hedgedoc.volumeClaimTemplates.resources.requests.storage }}
  selector:
    matchLabels:
      type: hedgedocdb
---
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.hedgedoc.name }}-uploads-pvc
  namespace: {{ .Values.hedgedoc.nameSpace }}
spec:
  accessModes:
    - {{ .Values.volume.accessModes }}
  resources:
    requests:
      storage:  {{ .Values.hedgedoc.volumeClaimTemplates.resources.requests.storage }}
  selector:
    matchLabels:
      type: hedgedocupload
{{- end }}
