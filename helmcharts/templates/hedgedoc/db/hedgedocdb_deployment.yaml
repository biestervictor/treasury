{{- if .Values.hedgedoc.database.internal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.hedgedoc.name }}-db
  namespace: {{ .Values.hedgedoc.nameSpace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.hedgedoc.name }}-db
  template:
    metadata:
      labels:
        app: {{ .Values.hedgedoc.name }}-db
    spec:
      containers:
        - name: postgres
          image: postgres:13.4-alpine
          env:
            - name: POSTGRES_USER
              value: {{ .Values.hedgedoc.database.internal.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.hedgedoc.database.internal.password }}
            - name: POSTGRES_DB
              value: {{ .Values.hedgedoc.database.internal.name }}
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: {{ .Values.hedgedoc.name }}-db-pvc
{{- end }}
