apiVersion: apps/v1
kind: Deployment
metadata:
  name: treasury
  namespace: {{ .Values.treasury.nameSpace}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: treasury
  template:
    metadata:
      labels:
        app: treasury
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: treasury
          image: "{{ .Values.treasury.image.name }}:{{ .Values.treasury.image.tag }}"
          command: ["java", "-jar", "app.jar"]
          args: ["--spring.profiles.active=kubitos"]
          env:
            - name: MAILJET_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.treasury.name }}-secret
                  key: mailJetApiKey
            - name: MAILJET_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.treasury.name }}-secret
                  key: mailJetApiSecret
            - name: TZ
              value: '{{ .Values.treasury.timezone | default "Europe/Berlin" }}'
            - name: TREASURY_BUILD_VERSION
              value: "{{ .Values.treasury.build.version | default 0 }}"
            - name: TREASURY_BUILD_TIME
              value: '{{ .Values.treasury.build.time | default "unknown" }}'
          volumeMounts:
            - name: tz-config
              mountPath: /etc/localtime
              readOnly: true
            - name: tz-zone
              mountPath: /etc/timezone
              readOnly: true
          ports:
            - containerPort: 8080

      volumes:
        - name: tz-config
          hostPath:
            path: /usr/share/zoneinfo/{{ .Values.treasury.timezone | default "Europe/Berlin" }}
            type: File
        - name: tz-zone
          hostPath:
            path: /etc/timezone
            type: File

