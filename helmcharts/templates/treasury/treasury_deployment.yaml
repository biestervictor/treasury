apiVersion: apps/v1
kind: Deployment
metadata:
  name: treasury
  namespace: {{ .Values.treasury.nameSpace}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: treasury
  template:
    metadata:
      labels:
        app: treasury
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: treasury
          image: "{{ .Values.treasury.image.name }}:{{ .Values.treasury.image.tag }}"
          command: ["java", "-jar", "app.jar"]
          args: ["--spring.profiles.active=kubitos"]
          env:
            - name: MAILJET_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.treasury.name }}-secret
                  key: mailJetApiKey
            - name: MAILJET_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.treasury.name }}-secret
                  key: mailJetApiSecret
            - name: TZ
              value: '{{ .Values.treasury.timezone | default "Europe/Berlin" }}'
            - name: TREASURY_BUILD_VERSION
              value: "{{ .Values.treasury.build.version | default 0 }}"
            - name: TREASURY_BUILD_TIME
              value: '{{ .Values.treasury.build.time | default "unknown" }}'
            {{- if .Values.mongodb.app.auth }}
            # Prod: SPRING_MONGODB_URI überschreibt den in application-kubitos.properties
            # hardcodierten In-Cluster-Service. URI kommt aus ExternalSecret (mongodb-credentials).
            - name: SPRING_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: MONGODB_URI
            {{- else }}
            # Dev: URI direkt als Env-Var, kein Auth nötig.
            - name: SPRING_MONGODB_URI
              value: "mongodb://{{ .Values.mongodb.app.host }}:{{ .Values.mongodb.app.port }}/{{ .Values.mongodb.app.database }}"
            {{- end }}
          ports:
            - containerPort: 8080


