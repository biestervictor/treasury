{{- if .Values.mongodb.app.auth }}
# ExternalSecret für Treasury MongoDB-Credentials (nur Prod, wenn mongodb.app.auth=true).
# Baut die MONGODB_URI aus mongoLogin + mongoSecret aus Azure Key Vault.
# Gleiche KV-Schlüssel wie suppcheck (gleicher MongoDB-Admin-User auf 192.168.178.141).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: treasury-mongodb-external-secret
  namespace: {{ .Values.treasury.nameSpace }}
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: {{ .Values.secretstore.name }}
    kind: ClusterSecretStore
  target:
    name: mongodb-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        MONGODB_URI: "mongodb://{{ `{{ .mongoLogin }}` }}:{{ `{{ .mongoSecret }}` }}@{{ .Values.mongodb.app.host }}:{{ .Values.mongodb.app.port }}/{{ .Values.mongodb.app.database }}?authSource=admin"
  data:
    - secretKey: mongoLogin
      remoteRef:
        key: mongoLogin
    - secretKey: mongoSecret
      remoteRef:
        key: mongoSecret
{{- end }}
